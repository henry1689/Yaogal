# PersonalWorld 配置文件
project:
  name: "瑶光 Yaogal"
  version: "0.2.0"
  data_dir: "./data"

# SQLite 数据库
database:
  path: "./data/world_runtime.db"
  wal_mode: true

# 和风天气 API — JWT Ed25519 认证
weather:
  jwt_kid: "CGWFMKD2KC"
  jwt_sub: "392G29C5UU"
  jwt_private_key_path: "./qweather-ed25519.pem"
  api_host: "https://k23fc3cb4e.re.qweatherapi.com"
  city_id: "101280601"
  cache_ttl_minutes: 30
  night_quiet_hours: "00:00-06:00"
  rate_limit_per_hour: 100

# 亲密感知引擎
intimacy:
  enabled: true
  encryption_key: ""
  data_path: "./data/intimacy.db"
  auto_learn: true

# WebSocket 对外接口
websocket:
  port: 9528
  max_connections: 1

# HTTP 行为接口
http:
  port: 9529
  max_body_size: "1mb"

# 运维监控
monitor:
  daily_report_time: "01:00"
  report_output_dir: "./reports"
  hook_log_dir: "./logs/hooks"

# 时间规则（铁律）
time_rules:
  flow_direction: "forward_only"
  sync_source: "system_clock"
  timezone: "Asia/Shanghai"
